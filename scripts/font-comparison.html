<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>ELLA — Font Comparison (S1.2 TB1)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Bodoni+Moda:opsz,wght@6..96,400;6..96,500&family=Italiana&family=Cormorant+Garamond:wght@400;500&family=Playfair+Display:wght@400;500&display=swap"
    rel="stylesheet"
  >
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #FFD9CC;
      color: #251008;
      padding: 64px 56px 80px;
    }
    .header {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 56px;
      padding-bottom: 24px;
      border-bottom: 1px solid rgba(37, 16, 8, 0.18);
    }
    .header .eyebrow {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(37, 16, 8, 0.55);
    }
    .header h1 {
      font-size: 22px;
      font-weight: 500;
      letter-spacing: 0.01em;
      color: rgba(37, 16, 8, 0.85);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 64px 64px;
    }
    .cell {
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 260px;
    }
    .cell .label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(37, 16, 8, 0.55);
    }
    .cell .ella {
      font-size: 124px;
      line-height: 0.95;
      letter-spacing: -0.005em;
    }
    .cell .semijoias {
      font-size: 30px;
      line-height: 1.1;
      color: rgba(37, 16, 8, 0.78);
      letter-spacing: 0.005em;
    }
    .cell.logo .logo-img {
      width: auto;
      height: 124px;
      object-fit: contain;
      object-position: left;
    }
    .cell.dmserif .ella, .cell.dmserif .semijoias { font-family: "DM Serif Display", serif; }
    .cell.bodoni .ella, .cell.bodoni .semijoias { font-family: "Bodoni Moda", serif; font-weight: 400; }
    .cell.italiana .ella, .cell.italiana .semijoias { font-family: "Italiana", serif; }
    .cell.cormorant .ella, .cell.cormorant .semijoias { font-family: "Cormorant Garamond", serif; font-weight: 500; }
    .cell.playfair .ella, .cell.playfair .semijoias { font-family: "Playfair Display", serif; font-weight: 400; }
  </style>
</head>
<body>
  <div class="header">
    <div class="eyebrow">S1.2 · TB1 · HITL fontes hero</div>
    <h1>Comparação ELLA — 5 candidatas Didone-ish vs logo bitmap</h1>
  </div>
  <div class="grid">
    <div class="cell logo">
      <div class="label">Logo bitmap (referência)</div>
      <img class="logo-img" src="../assets/brand/logo.jpg" alt="ELLA logo">
      <div class="semijoias">Semijoias</div>
    </div>
    <div class="cell dmserif">
      <div class="label">DM Serif Display (atual placeholder)</div>
      <div class="ella">ELLA</div>
      <div class="semijoias">Semijoias</div>
    </div>
    <div class="cell bodoni">
      <div class="label">Bodoni Moda</div>
      <div class="ella">ELLA</div>
      <div class="semijoias">Semijoias</div>
    </div>
    <div class="cell italiana">
      <div class="label">Italiana</div>
      <div class="ella">ELLA</div>
      <div class="semijoias">Semijoias</div>
    </div>
    <div class="cell cormorant">
      <div class="label">Cormorant Garamond</div>
      <div class="ella">ELLA</div>
      <div class="semijoias">Semijoias</div>
    </div>
    <div class="cell playfair">
      <div class="label">Playfair Display</div>
      <div class="ella">ELLA</div>
      <div class="semijoias">Semijoias</div>
    </div>
  </div>
</body>
</html>
